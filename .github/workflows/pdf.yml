name: Build PDF

on:
  workflow_dispatch:    # solo manuale, non su push

jobs:
  build-pdf:
    name: Build CV PDFs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pdf/requirements.txt

      - name: Install Python deps
        run: pip install -r pdf/requirements.txt

      - name: Set up Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.1"

      - name: Build all PDFs
        run: python pdf/build.py --all

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: pdf/dist/*.pdf
          retention-days: 30
